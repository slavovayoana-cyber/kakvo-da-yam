<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Какво да ям?</title>
<meta name="description" content="Едно приложение, четири настроения + български бонус, нула решения за вземане." />
<style>
  :root {
    --bg-top: #FCEBDD;
    --bg-bot: #F5C2A3;
    --ink: #42201A;
    --accent: #C57247;
    --muted: rgba(66, 32, 26, 0.65);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    padding: 64px 24px 64px;
    display: flex; flex-direction: column; align-items: center;
  }
  .wrap {
    max-width: 600px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    margin: 0 0 12px;
  }
  h1 .q { color: var(--accent); }
  .tag {
    color: var(--muted);
    font-size: 17px;
    margin: 0 0 40px;
  }
  .moods {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin: 32px 0;
  }
  .chip {
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(0,0,0,0.06);
    font-size: 14px;
    font-weight: 500;
  }
  .download {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin: 8px 0 24px;
  }
  .store-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    border-radius: 14px;
    background: var(--ink);
    color: #FCEBDD;
    text-decoration: none;
    font-family: inherit;
    transition: transform 180ms ease, background 180ms ease;
  }
  .store-btn:hover { background: var(--accent); transform: translateY(-1px); }
  .store-btn .store-icon { font-size: 22px; line-height: 1; }
  .store-btn .store-sub { display: block; font-size: 10px; opacity: 0.75; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
  .store-btn .store-main { display: block; font-size: 15px; font-weight: 600; }
  .store-btn.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

  .links {
    margin-top: 56px;
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
  }
  .links a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 4px;
    font-size: 14px;
  }
  footer {
    margin-top: 56px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    font-family: ui-monospace, SF Mono, Menlo, monospace;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Какво<br/>да ям<span class="q">?</span></h1>
  <p class="tag">Едно приложение, четири настроения + български бонус, нула решения за вземане.</p>

  <div class="download">
    <a class="store-btn" href="https://apps.apple.com/us/app/%D0%BA%D0%B0%D0%BA%D0%B2%D0%BE-%D0%B4%D0%B0-%D1%8F%D0%BC/id6766818647" target="_blank" rel="noopener">
      <span class="store-icon"></span>
      <span>
        <span class="store-sub">Свали от</span>
        <span class="store-main">App Store</span>
      </span>
    </a>
    <span class="store-btn disabled" title="Очаквайте скоро">
      <span class="store-icon">▶</span>
      <span>
        <span class="store-sub">Очаквайте скоро</span>
        <span class="store-main">Google Play</span>
      </span>
    </span>
  </div>

  <div class="moods">
    <div class="chip">🥗 Healthy-ish</div>
    <div class="chip">💅 Fancy</div>
    <div class="chip">😂 Honest</div>
    <div class="chip">🧸 Comfort</div>
    <div class="chip">🇧🇬 Bulgarian</div>
    <div class="chip">🎲 Всички</div>
  </div>

  <div class="links">
    <a href="PRIVACY.html">Privacy Policy</a>
    <a href="https://github.com/slavovayoana-cyber/kakvo-da-yam">GitHub</a>
  </div>

  <footer>com.kakvodayam.app · v1.0</footer>
</div>
</body>
</html>
