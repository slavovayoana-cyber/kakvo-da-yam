<!doctype html>
<html lang="bg">

<style>
  :root {
    --bg-top: #FCEBDD;
    --bg-bot: #F5C2A3;
    --ink: #42201A;
    --accent: #C57247;
    --muted: rgba(66, 32, 26, 0.65);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    padding: 64px 24px 64px;
    display: flex; flex-direction: column; align-items: center;
  }
  .wrap {
    max-width: 600px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    margin: 0 0 12px;
  }
  h1 .q { color: var(--accent); }
  .tag {
    color: var(--muted);
    font-size: 17px;
    margin: 0 0 40px;
  }
  .moods {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin: 32px 0;
  }
  .chip {
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(0,0,0,0.06);
    font-size: 14px;
    font-weight: 500;
  }
  .links {
    margin-top: 56px;
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
  }
  .links a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 4px;
    font-size: 14px;
  }
  footer {
    margin-top: 56px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    font-family: ui-monospace, SF Mono, Menlo, monospace;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Какво<br/>да ям<span class="q">?</span></h1>
  <p class="tag">Едно приложение, четири настроения + български бонус, нула решения за вземане.</p>

  <div class="moods">
    <div class="chip">🥗 Healthy-ish</div>
